<!DOCTYPE html>
<html>
<head>
<title>For Someone Special 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(45deg,#ff6ec4,#7873f5,#42e695);
  background-size: 400% 400%;
  animation: gradient 8s ease infinite;
  color: white;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.container {
  margin-top: 30%;
  padding: 20px;
}

h1 {
  font-size: 32px;
}

p {
  font-size: 20px;
  margin-top: 15px;
}

button {
  margin-top: 20px;
  padding: 10px 25px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  background: white;
  color: #ff4081;
  font-weight: bold;
}

#surprise {
  display: none;
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Happy Holi 🌸</h1>
  <p id="message"></p>
  <button onclick="showSurprise()">Click for Surprise 🎁</button>
  <div id="surprise">You make my life more colorful than Holi itself 💖✨</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){
  document.getElementById("message").innerHTML =
  "This Holi is more special because of you, " + name + " 💕";
} else {
  document.getElementById("message").innerHTML =
  "This Holi is more special because of you 💕";
}

function showSurprise(){
  document.getElementById("surprise").style.display = "block";
}
</script>

</body>
</html>
